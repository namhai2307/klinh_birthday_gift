<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        a, a:link, a:hover, a:active {
            text-decoration: none;
        }
        .wrapper {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            margin: auto;
            width: 300px;
            height: 200px;
            text-align: center;
        }
        .wrapper h1 {
            margin-top: 15px;
            font-size: 12px;
            color: red;
        }
        .bonus {
            position: absolute;
            bottom: 5px;
            left: 50%;
            margin-left: -40px;
            width: 80px;
            height: 70px;
            text-align: center;
            overflow: visible;
            border-radius: 3px;
            background-color: #e74c3c;
            background-image: linear-gradient(#FFD700, #FFD700), linear-gradient(#FFD700, #FFD700);
            background-size: 14px 100%, 100% 14px;
            background-position: center, center;
            background-repeat: no-repeat;
            transition: all .75s ease;
            animation-name: shaking;
        }
        /* Gift box lid */
        .bonus:after {
            position: absolute;
            top: -16px;
            left: -5px;
            content: '';
            width: 90px;
            height: 16px;
            background-color: #c0392b;
            background-image: linear-gradient(#FFD700, #FFD700);
            background-size: 14px 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 2px;
            z-index: 3;
        }
        /* Bow on top */
        .bonus:before {
            position: absolute;
            top: -46px;
            left: 50%;
            transform: translateX(-50%);
            content: '🎀';
            font-size: 28px;
            line-height: 1;
            width: auto;
            height: auto;
            border-radius: 0;
            background: none;
            z-index: 4;
        }
        .surprises .fly {
            position: absolute;
            top: 45px;
            left: 0;
            color: #F37476;
            z-index: 0;
            opacity: 0;
            font-size: 10px;
            animation-duration: 1.65s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-name: flying;
        }
        .fly:nth-child(1) { animation-delay: 1.5s; left: 150px; }
        .fly:nth-child(2) { animation-delay: 1.2s; left: 130px; }
        .fly:nth-child(3) { animation-delay: 0.9s; left: 165px; }
        .fly:nth-child(4) { animation-delay: 1.6s; left: 110px; }
        .fly:nth-child(5) { animation-delay: 0.3s; left: 175px; }
        .fly:nth-child(6) { animation-delay: 0.15s; left: 137px; }
        .fly:nth-child(7) { animation-delay: 1.15s; left: 185px; }
        .fly:nth-child(8) { animation-delay: 0.75s; left: 118px; }
        
        .hearts {
            position: relative;
        }
        .hearts:before, .hearts:after {
            position: absolute;
            content: '';
            width: 6px;
            height: 10px;
            background: #FF370F;
            border-radius: 3px 3px 0 0;
            transform: rotate(-45deg);
            transform-origin: 10% 50%;
        }
        .hearts:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 110% 68%;
        }
        
        .jumping, .shaking {
            animation-duration: 1.2s;
            animation-timing-function: ease;
            animation-iteration-count: infinite;
            animation-play-state: running;
        }
        
        @keyframes shaking {
            0% { margin-left: -35px; }
            10% { margin-left: -45px; }
            20% { margin-left: -35px; }
            30% { margin-left: -45px; }
            40% { margin-left: -35px; }
            50% { margin-left: -40px; }
            65% { bottom: 20px; }
            100% { bottom: 5px; }
        }
        @keyframes flying {
            0% { transform: rotate(20deg); opacity: 0; }
            50% { transform: rotate(-20deg); opacity: 1; }
            100% { top: -60px; transform: rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <a href = 'inside.html'>
    <div class="wrapper">
        <div class="surprises">
            <div class="fly">10w</div>
            <div class="fly">5毛</div>
            <div class="fly">100k</div>
            <div class="fly">500k</div>
            <div class="fly">999k</div>
            <div class="fly"><i class="hearts"></i></div>
            <div class="fly">$</div>
            <div class="fly"><i class="hearts"></i></div>
        </div>
        <div class="bonus jumping"></div>
    </div>
    </a>
</body>
</html>
